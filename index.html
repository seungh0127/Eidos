<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eidos</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }

/* ── Page system ── */
.page {
  position: fixed; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
.page.active {
  opacity: 1; pointer-events: auto;
}

#page2 { background: #fff; }

/* ── Logo button ── */
#logo-btn {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
#logo-btn img {
  display: block;
  height: 72px;
  width: auto;
}

/* ── Gallery page ── */
#viewport {
  position: absolute; inset: 0; overflow: hidden;
  cursor: grab; user-select: none; -webkit-user-select: none;
}
#viewport.dragging { cursor: grabbing; }
#world {
  position: absolute; top: 0; left: 0;
  transform-origin: 0 0;
  will-change: transform;
}
.module {
  position: absolute;
  transform-origin: center center;
  transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.module img {
  display: block;
  width: 200px; height: 200px;
  object-fit: contain;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- Page 1: Gallery -->
<div id="page1" class="page active">
  <div id="viewport">
    <div id="world"></div>
  </div>
</div>

<!-- Page 2: blank -->
<div id="page2" class="page"></div>

<!-- Logo: always on top, toggles pages -->
<div id="logo-btn">
  <img src="assets/Logo.svg" alt="Eidos">
</div>
<script>
// ─── Module list ──────────────────────────────────────────────────────────────
const MODULES = [
  'H-A-1','H-A-2','H-A-3','H-A-4','H-A-5',
  'H-B-1','H-B-2','H-B-3','H-B-4','H-B-5',
  'H-C-1','H-C-2','H-C-3','H-C-4','H-C-5',
  'H-D-1','H-D-2','H-D-3','H-D-4',
  'H-E-1','H-E-2',
  'C-A-1','C-A-2','C-A-3',
  'C-B-1','C-B-2','C-B-3',
  'C-C-1','C-C-2','C-C-3',
  'C-D-1','C-D-2',
  'C-E-1','C-E-2','C-E-3',
  'S-A-1','S-A-2','S-A-3',
  'S-B-1','S-B-2',
  'S-C-1','S-C-2','S-C-3',
  'S-D-1','S-D-2','S-D-3',
  'S-E-1','S-E-2','S-E-3',
  'U-A-1','U-A-2',
  'U-B-1','U-B-2','U-B-3',
  'U-C-1','U-C-2',
  'U-D-1','U-D-2',
  'U-E-1','U-E-2','U-E-3',
  'F-A-1','F-A-2','F-A-3',
  'F-B-1','F-B-2',
  'F-C-1','F-C-2','F-C-3',
  'F-D-1','F-D-2','F-D-3',
  'F-E-1','F-E-2',
  'E-A-1','E-A-2','E-A-3',
  'E-B-1','E-B-2',
  'E-C-1','E-C-2',
  'E-D-1','E-D-2','E-D-3','E-D-4','E-D-5','E-D-6',
  'L-A-2','L-A-3',
  'L-B-1','L-B-2','L-B-3',
  'L-C-1','L-C-2','L-C-3','L-C-4',
  'L-D-1','L-D-2','L-D-3',
  'L-E-1','L-E-2',
  'L-F-1','L-F-2','L-F-3',
  'L-G-1',
  'EX-A-0','EX-A-1','EX-A-2',
  'EX-B-1','EX-C-1','EX-D-1',
];

// ─── Grid layout ─────────────────────────────────────────────────────────────
const IMG  = 200;
const GAP  = 160;
const CELL = IMG + GAP;   // 440 world px per grid cell

// ─── PRNG ─────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  seed = seed >>> 0;
  return function () {
    seed = (seed + 0x6D2B79F5) >>> 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Deterministic module file for each grid position
function moduleAt(c, r) {
  const seed = (((c * 73856093) ^ (r * 19349663)) >>> 0) + 1;
  const rng  = mulberry32(seed);
  return MODULES[Math.floor(rng() * MODULES.length)];
}

// ─── DOM elements ─────────────────────────────────────────────────────────────
const world    = document.getElementById('world');
const viewport = document.getElementById('viewport');

// ─── Element pool ─────────────────────────────────────────────────────────────
const modulePool = [];

function acquireModule() {
  const el = modulePool.pop() || (() => {
    const d = document.createElement('div');
    d.className = 'module';
    const img = document.createElement('img');
    d.appendChild(img);
    return d;
  })();
  return el;
}

function releaseModule(el) {
  // Revert GIF to WebP before pooling
  const img = el.querySelector('img');
  if (img && img.dataset.mode === 'gif') {
    img.src = `assets/thumbs/${el.dataset.file}.webp`;
    img.dataset.mode = '';
  }
  el.style.transform = '';
  el.style.zIndex    = '';
  if (modulePool.length < 300) modulePool.push(el);
}

// ─── Active modules ────────────────────────────────────────────────────────────
// "c,r" → DOM element
const active = new Map();

function addModule(c, r) {
  const key  = c + ',' + r;
  if (active.has(key)) return;

  const file = moduleAt(c, r);
  const el   = acquireModule();
  el.dataset.file = file;
  el.style.left   = (c * CELL) + 'px';
  el.style.top    = (r * CELL) + 'px';

  const img = el.querySelector('img');
  img.src          = `assets/thumbs/${file}.webp`;
  img.alt          = file;
  img.dataset.mode = '';

  applyModBaseScale(el, modBaseScale);
  world.appendChild(el);
  active.set(key, el);
}

function removeModule(key) {
  const el = active.get(key);
  if (!el) return;
  world.removeChild(el);
  releaseModule(el);
  active.delete(key);
}

// ─── Module base scale (widens gap as zoom increases above 1.0) ───────────────
// Returns a CSS scale < 1 applied to each module when zoomed in,
// shrinking the image in world-space so the gap grows proportionally.
function getModBaseScale(s) {
  if (s >= 1.0) return 1.0;
  return Math.max(0.65, 1.0 - (1.0 - s) * 0.3);
}

let modBaseScale = 1.0;

function applyModBaseScale(el, mbs) {
  el.style.transform = mbs < 1.0 ? `scale(${mbs.toFixed(4)})` : '';
}

function updateModuleBaseScales() {
  const mbs = getModBaseScale(scale);
  if (Math.abs(mbs - modBaseScale) < 0.0005) return;
  modBaseScale = mbs;
  for (const el of active.values()) {
    if (el.dataset.hovered === '1') continue;   // don't interrupt hover
    applyModBaseScale(el, mbs);
  }
}

// ─── Camera ───────────────────────────────────────────────────────────────────
let camX  = -window.innerWidth  / 2;
let camY  = -window.innerHeight / 2;
let scale = 1.0;
const MIN_SCALE = 0.35, MAX_SCALE = 1.5;

const DRIFT    = 0.55;
const DRIFT_DX = Math.cos(150 * Math.PI / 180) * DRIFT;
const DRIFT_DY = Math.sin(150 * Math.PI / 180) * DRIFT;

function applyCamera() {
  world.style.transform = `scale(${scale}) translate(${-camX}px,${-camY}px)`;
}

// ─── Viewport culling ─────────────────────────────────────────────────────────
// Triggered only when grid-column or grid-row boundary is crossed.
let lastBounds = null;

function updateModules() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const margin = CELL;   // 1-cell render margin around viewport

  // Grid range that should be rendered
  const minC = Math.floor((camX - margin) / CELL);
  const maxC = Math.floor((camX + vw / scale + margin) / CELL);
  const minR = Math.floor((camY - margin) / CELL);
  const maxR = Math.floor((camY + vh / scale + margin) / CELL);

  // Fast exit: nothing changed
  if (lastBounds &&
      minC === lastBounds.minC && maxC === lastBounds.maxC &&
      minR === lastBounds.minR && maxR === lastBounds.maxR) return;
  lastBounds = { minC, maxC, minR, maxR };

  // Remove modules outside 2-cell remove margin
  const rm = CELL * 2;
  const rmMinC = Math.floor((camX - rm) / CELL);
  const rmMaxC = Math.floor((camX + vw / scale + rm) / CELL);
  const rmMinR = Math.floor((camY - rm) / CELL);
  const rmMaxR = Math.floor((camY + vh / scale + rm) / CELL);

  for (const [key, el] of active) {
    const comma = key.indexOf(',');
    const c = +key.slice(0, comma), r = +key.slice(comma + 1);
    if (c < rmMinC || c > rmMaxC || r < rmMinR || r > rmMaxR) removeModule(key);
  }

  // Add modules in render range
  for (let r = minR; r <= maxR; r++) {
    for (let c = minC; c <= maxC; c++) addModule(c, r);
  }

  // Preload WebP for 2-cell margin zone
  for (let r = rmMinR; r <= rmMaxR; r++) {
    for (let c = rmMinC; c <= rmMaxC; c++) {
      if (!active.has(c + ',' + r)) preloadWebP(moduleAt(c, r));
    }
  }
}

// ─── WebP preload ─────────────────────────────────────────────────────────────
const webpPreloaded = new Set();
function preloadWebP(file) {
  if (webpPreloaded.has(file)) return;
  webpPreloaded.add(file);
  new Image().src = `assets/thumbs/${file}.webp`;
}

// ─── GIF cache ────────────────────────────────────────────────────────────────
const gifCache     = new Map();
const MAX_GIF_CACHE = 16;

function preloadGif(file) {
  if (gifCache.has(file)) return;
  if (gifCache.size >= MAX_GIF_CACHE) gifCache.delete(gifCache.keys().next().value);
  const img = new Image();
  img.src = `assets/${file}.gif`;
  gifCache.set(file, img);
}

// ─── Hover (event delegation) ─────────────────────────────────────────────────
world.addEventListener('mouseover', e => {
  if (isDragging) return;
  const mod = e.target.closest('.module');
  if (!mod) return;
  const file = mod.dataset.file;
  if (!file) return;

  mod.dataset.hovered = '1';
  mod.style.transform = `scale(${(modBaseScale * 1.22).toFixed(4)})`;
  mod.style.zIndex    = '100';

  const img = mod.querySelector('img');
  if (img && img.dataset.mode !== 'gif') {
    img.src = '';
    img.src = `assets/${file}.gif`;
    img.dataset.mode = 'gif';
  }
});

world.addEventListener('mouseout', e => {
  const mod = e.target.closest('.module');
  if (!mod || mod.contains(e.relatedTarget)) return;

  mod.dataset.hovered = '';
  applyModBaseScale(mod, modBaseScale);
  mod.style.zIndex    = '';

  const img = mod.querySelector('img');
  if (img && img.dataset.mode === 'gif') {
    img.src = `assets/thumbs/${mod.dataset.file}.webp`;
    img.dataset.mode = '';
  }
});

// GIF proximity preload
let gifTimer = null;
viewport.addEventListener('mousemove', e => {
  clearTimeout(gifTimer);
  gifTimer = setTimeout(() => {
    const wx = e.clientX / scale + camX;
    const wy = e.clientY / scale + camY;
    const r  = CELL * 1.5;

    // Check nearby grid cells
    const nearC0 = Math.floor((wx - r) / CELL), nearC1 = Math.floor((wx + r) / CELL);
    const nearR0 = Math.floor((wy - r) / CELL), nearR1 = Math.floor((wy + r) / CELL);
    for (let row = nearR0; row <= nearR1; row++) {
      for (let col = nearC0; col <= nearC1; col++) {
        const dx = wx - (col * CELL + IMG / 2), dy = wy - (row * CELL + IMG / 2);
        if (dx * dx + dy * dy < r * r) preloadGif(moduleAt(col, row));
      }
    }
  }, 80);
});

// ─── Drag state ───────────────────────────────────────────────────────────────
let isDragging = false;
let dragStartX, dragStartY, dragCamX0, dragCamY0;
let velX = 0, velY = 0;
let prevMX, prevMY, prevT;

// ─── Animation loop ───────────────────────────────────────────────────────────
let lastTS = 0;

function loop(ts) {
  const dt = Math.min(ts - lastTS, 50) / 16.667;
  lastTS = ts;

  if (!isDragging) {
    camX += DRIFT_DX * dt / scale;
    camY += DRIFT_DY * dt / scale;
  }

  if (!isDragging) {
    if (Math.abs(velX) > 0.05 || Math.abs(velY) > 0.05) {
      camX += velX * dt;
      camY += velY * dt;
      velX *= Math.pow(0.88, dt);
      velY *= Math.pow(0.88, dt);
    } else {
      velX = 0; velY = 0;
    }
  }

  updateModules();           // acts only when a grid boundary is crossed
  updateModuleBaseScales();  // acts only when scale crosses a threshold
  applyCamera();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── Mouse drag ───────────────────────────────────────────────────────────────
viewport.addEventListener('mousedown', e => {
  isDragging = true;
  viewport.classList.add('dragging');
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragCamX0  = camX;      dragCamY0  = camY;
  velX = 0; velY = 0;
  prevMX = e.clientX; prevMY = e.clientY; prevT = performance.now();
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  camX = dragCamX0 - (e.clientX - dragStartX) / scale;
  camY = dragCamY0 - (e.clientY - dragStartY) / scale;
  const now = performance.now(), dt2 = now - prevT;
  if (dt2 > 0) {
    velX = ((prevMX - e.clientX) / scale) / dt2 * 16;
    velY = ((prevMY - e.clientY) / scale) / dt2 * 16;
  }
  prevMX = e.clientX; prevMY = e.clientY; prevT = now;
});

window.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  viewport.classList.remove('dragging');
  const cap = 25;
  velX = Math.max(-cap, Math.min(cap, velX));
  velY = Math.max(-cap, Math.min(cap, velY));
});

// ─── Touch drag ───────────────────────────────────────────────────────────────
let touchCamX0, touchCamY0, touchStartX, touchStartY;

viewport.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  isDragging  = true;
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
  touchCamX0  = camX;                 touchCamY0  = camY;
  velX = 0; velY = 0;
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  camX = touchCamX0 - (e.touches[0].clientX - touchStartX) / scale;
  camY = touchCamY0 - (e.touches[0].clientY - touchStartY) / scale;
}, { passive: true });

viewport.addEventListener('touchend', () => { isDragging = false; }, { passive: true });

// ─── Wheel zoom ───────────────────────────────────────────────────────────────
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const mx = e.clientX, my = e.clientY;
  const wx = mx / scale + camX;
  const wy = my / scale + camY;

  let delta = e.deltaY;
  if (e.deltaMode === 1) delta *= 20;
  if (e.deltaMode === 2) delta *= 300;

  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * Math.pow(0.998, delta)));
  if (newScale !== scale) {
    scale = newScale;
    camX  = wx - mx / scale;
    camY  = wy - my / scale;
  }
}, { passive: false });

// ─── Page toggle ──────────────────────────────────────────────────────────────
const page1   = document.getElementById('page1');
const page2   = document.getElementById('page2');
const logoBtn = document.getElementById('logo-btn');
let   currentPage = 1;

logoBtn.addEventListener('click', () => {
  if (currentPage === 1) {
    page1.classList.remove('active');
    page2.classList.add('active');
    currentPage = 2;
  } else {
    page2.classList.remove('active');
    page1.classList.add('active');
    currentPage = 1;
  }
});
</script>
</body>
</html>
