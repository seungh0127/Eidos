<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF" />
<meta name="color-scheme" content="light" />
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Eidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  font-size: 62.5%; /* 1rem = 10px (design spec base) */
  color-scheme: light; /* Safari가 다크 모드 색상으로 판단하지 않도록 */
}

html {
  width: 100%;
  min-height: 100%;
  min-height: 100dvh;
  background: #fff;
}
body {
  font-size: 16px; /* restore body text to 16px */
  width: 100%;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  background: #fff;
  font-family: 'Roboto Mono', 'Pretendard Variable', 'Pretendard', sans-serif;
}

/* ── Page system ── */
.page {
  position: fixed;
  inset: 0;
  background: #fff;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
.page.active { opacity: 1; pointer-events: auto; }

/* ── Safe Area 전용 흰색 배경 레이어 ──────────────────────────────────────────
   갤러리 모듈의 어두운 배경이 노치/홈 인디케이터 구역에 노출되지 않도록
   z-index: 10000 (갤러리·UI버튼 위, 팝업 오버레이 99998 아래)으로 덮음.
   로고·토글은 Safe Area 바깥에 배치되어 시각적 충돌 없음. ─────────────────── */
.sa-bg {
  position: fixed;
  left: 0; right: 0;
  background: #fff;
  z-index: 999999; /* 팝업 오버레이(99998) 포함 모든 레이어 위 — Safe Area는 항상 흰색 */
  pointer-events: none;
}
.sa-bg-top {
  top: 0;
  height: constant(safe-area-inset-top);
  height: env(safe-area-inset-top, 0px);
}
.sa-bg-bottom {
  bottom: 0;
  height: constant(safe-area-inset-bottom);
  height: env(safe-area-inset-bottom, 0px);
}

/* ── Gallery viewport ── */
#viewport {
  position: fixed;
  inset: 0; /* 갤러리 캔버스는 Safe Area 포함 전체 화면을 채움 */
  overflow: hidden;
  cursor: grab;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
#viewport.dragging { cursor: grabbing; }
#world {
  position: absolute; top: 0; left: 0;
  transform-origin: 0 0;
  will-change: transform;
}

/* ── Module ── */
.module {
  position: absolute;
  transform-origin: center center;
  transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.module img {
  display: block;
  width: var(--mod-img, 200px);
  height: var(--mod-img, 200px);
  object-fit: contain;
  pointer-events: none;
}

/* ── Logo button — safe area 하단 ── */
#logo-btn {
  position: fixed;
  bottom: max(20px, constant(safe-area-inset-bottom));
  bottom: max(20px, env(safe-area-inset-bottom, 20px));
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  cursor: pointer;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#logo-btn img { display: block; height: 72px; width: auto; pointer-events: none; }

/* ── About page ── */
#about-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(32px, 4vh, 60px) clamp(32px, 5vw, 80px) 120px;
  box-sizing: border-box;
}

#about-text-container {
  position: relative;
  max-width: 88vw;
  margin-bottom: clamp(40px, 4vw, 120px);
  overflow: hidden;
  isolation: isolate;
}

#about-badge-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: clamp(10px, 1.5vh, 16px);
  overflow: hidden;
  isolation: isolate;
  border-radius: 100px;
}

#about-copy br { display: none; }

/* Badge spotlight (glow on dark bg) */
.about-spotlight {
  position: absolute;
  width: 200px;
  height: 200px;
  background: #0D92FF;
  border-radius: 50%;
  filter: blur(40px);
  pointer-events: none;
  mix-blend-mode: screen;
  transform: translate(-50%, -50%);
  left: -9999px;
  top: -9999px;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 10;
}

/* Blue text overlay — masked by cursor circle */
#about-text-blue {
  position: absolute;
  inset: 0;
  font-family: 'helvetica-neue-lt-pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(18px, 2.6vw, 56px);
  font-weight: 500;
  line-height: 1.33;
  letter-spacing: -0.02em;
  color: #0D92FF;
  text-align: center;
  word-break: keep-all;
  pointer-events: none;
  -webkit-mask-image: radial-gradient(circle 220px at var(--mx, -9999px) var(--my, -9999px), black 15%, transparent 60%);
  mask-image: radial-gradient(circle 220px at var(--mx, -9999px) var(--my, -9999px), black 15%, transparent 60%);
  z-index: 5;
}

#about-text {
  font-family: 'helvetica-neue-lt-pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(18px, 2.6vw, 56px);
  font-weight: 500;
  line-height: 1.33;
  letter-spacing: -0.02em;
  color: #111;
  text-align: center;
  word-break: keep-all;
  user-select: none;
  -webkit-user-select: none;
}

/* Word-reveal animation */
.word-wrap {
  display: inline-block;
  overflow: hidden;
  vertical-align: bottom;
  padding-bottom: 0.12em;
  margin-bottom: -0.12em;
}

.word-inner {
  display: inline-block;
  transform: translateY(115%);
  opacity: 0;
  will-change: transform, opacity;
}

.word-inner.revealed {
  animation: wordUp 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes wordUp {
  0%   { transform: translateY(115%); opacity: 0; }
  100% { transform: translateY(0);    opacity: 1; }
}

#about-credits {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  margin-bottom: clamp(40px, 4vw, 120px);
  flex-wrap: nowrap;
}

.credit-divider {
  width: 1px;
  background: #404040;
  margin: 0 clamp(14px, 2vw, 28px);
  flex-shrink: 0;
}

.credit-item {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
  text-decoration: none;
  color: inherit;
  white-space: nowrap;
}

.credit-role {
  font-family: 'helvetica-neue-lt-pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(11px, 0.9vw, 13px);
  font-weight: 400;
  color: #404040;
  line-height: 1.3;
}

.credit-name {
  font-family: 'helvetica-neue-lt-pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(12px, 1vw, 15px);
  font-weight: 500;
  color: #000;
  line-height: 1.3;
}

.credit-item:hover .credit-name { text-decoration: underline; }

#about-badge {
  display: inline-block;
  padding: clamp(8px, 1vh, 11px) clamp(16px, 1.5vw, 24px);
  background: #1a1a1a;
  color: #fff;
  font-family: 'helvetica-neue-lt-pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(12px, 0.95vw, 14px);
  font-weight: 500;
  letter-spacing: 0.01em;
  border-radius: 100px;
  text-decoration: none;
}

#about-badge:hover { background: #333; }

#about-copy {
  font-family: 'helvetica-neue-lt-pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(10px, 0.8vw, 12px);
  font-weight: 400;
  color: #404040;
  text-align: center;
}

/* ── About page: desktop scroll wrapper (no-op) ── */
#about-scroll {
  position: static;
  width: 100%;
  height: 100%;
}

/* ── About page: gradient blur overlays (mobile only) ── */
.about-blur-bottom {
  display: none;
}

/* ── About page: mobile ── */
@media (max-width: 768px) {
  #about-scroll {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    z-index: 1;
  }

  #about-wrap {
    position: static;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 17.8rem 3.2rem 22.6rem;
    min-height: 100%;
    box-sizing: border-box;
  }

  #about-text-container {
    max-width: 100%;
    margin-bottom: 5.6rem;
  }

  #about-text,
  #about-text-blue {
    font-size: clamp(30px, 8.5vw, 44px);
    line-height: 1.32;
  }

  #about-credits {
    flex-direction: column;
    align-items: center;
    gap: 3.2rem;
    margin-bottom: 5.6rem;
  }

  .credit-divider { display: none; }

  .credit-item { align-items: center; }

  .credit-role { font-size: 1.4rem; }
  .credit-name { font-size: 1.6rem; }

  #about-badge-wrap { margin-bottom: 1.4rem; }
  #about-badge { font-size: 1.5rem; padding: 1.1rem 2.4rem; }
  #about-copy { font-size: 1.2rem; }

  /* Gradient overlays */
  .about-blur-bottom {
    display: block;
    position: fixed;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 500;
    background: linear-gradient(180deg, color(display-p3 1 1 1 / 0.00) 0%, color(display-p3 1 1 1) 60%, color(display-p3 1 1 1) 100%);
  }

  .about-blur-bottom {
    bottom: 0;
    height: 22.6rem;
  }
}

/* ── Main navigation ── */
#main-nav {
  position: fixed;
  top: max(12px, constant(safe-area-inset-top));
  top: max(12px, env(safe-area-inset-top, 12px));
  left: max(14px, constant(safe-area-inset-left));
  left: max(14px, env(safe-area-inset-left, 14px));
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 1px;
  mix-blend-mode: difference; /* 컨테이너에 적용 — 페이지 배경과 올바르게 블렌딩 */
}
.nav-link {
  font-family: 'helvetica-neue-lt-pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.01em;
  line-height: 1.25;
  color: #808080; /* difference 후 흰 배경에서 #7F7F7F로 표시 */
  text-decoration: none;
  display: block;
  cursor: pointer;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.3s ease;
}
.nav-link.active {
  color: #FFFFFF; /* difference 후 흰 배경에서 #000000, 어두운 배경에서 밝게 표시 */
}
@media (max-width: 768px) {
  .nav-link { font-size: 22px; font-weight: 500; }
  #main-nav { gap: 3px; }
}

/* ── Page 3: Possibilities ── */
#page3 { background: #111111; }

/* ── Gyro toggle — safe area 우측 상단 ── */
#gyro-toggle {
  position: fixed;
  top: max(16px, constant(safe-area-inset-top));
  top: max(16px, env(safe-area-inset-top, 16px));
  right: max(16px, constant(safe-area-inset-right));
  right: max(16px, env(safe-area-inset-right, 16px));
  z-index: 9999;

  /* Layout */
  display: none;
  width: 5.7rem;
  padding: 0.8rem 2rem;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  white-space: nowrap;

  /* Style — ON */
  border: 0;
  border-radius: 8rem;
  background: #0095FF;
  background: color(display-p3 0.0525 0.5736 1);

  color: #fff;
  font-family: 'Roboto Mono', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s ease;
  box-sizing: border-box;
}
#gyro-toggle.visible { display: flex; }
#gyro-toggle.off {
  background: #2B2B2B;
  background: color(display-p3 0.1683 0.1683 0.1683);
}

/* ── Gyro permission overlay ── */
#gyro-overlay {
  /* 배경은 Safe Area 포함 전체 화면을 덮음 — padding 없음 */
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100dvh;
  background: rgba(0, 0, 0, 0.80);
  z-index: 99998;
  display: none;
  transition: opacity 0.4s ease;
}
#gyro-overlay.visible { display: flex; }

/* 팝업 카드 래퍼 — Safe Area 안쪽에서 카드 배치 */
.motion-dialog-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 100dvh;
  padding-top: max(16px, constant(safe-area-inset-top));
  padding-top: max(16px, env(safe-area-inset-top, 16px));
  padding-right: max(16px, constant(safe-area-inset-right));
  padding-right: max(16px, env(safe-area-inset-right, 16px));
  padding-bottom: max(16px, constant(safe-area-inset-bottom));
  padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
  padding-left: max(16px, constant(safe-area-inset-left));
  padding-left: max(16px, env(safe-area-inset-left, 16px));
  box-sizing: border-box;
}

.motion-dialog {
  display: flex;
  padding: 3.0rem 5rem;
  flex-direction: column;
  align-items: center;
  gap: 0;

  border-radius: 2.4rem;
  background: #FFF;
  background: color(display-p3 1 1 1);

  box-sizing: border-box;
  max-width: calc(100vw - 3rem);
  max-height: calc(
    100dvh
    - max(16px, env(safe-area-inset-top, 16px))
    - max(16px, env(safe-area-inset-bottom, 16px))
    - 32px
  );
  overflow-y: auto;
}

.motion-dialog-title {
  margin: 0;
  color: #000;
  color: color(display-p3 0 0 0);
  text-align: center;
  font-family: "Roboto Mono", monospace;
  font-size: 2.0rem;
  font-style: normal;
  font-weight: 500;
  line-height: 118%;
  letter-spacing: -0.132rem;
}

.motion-dialog-description {
  margin: 0;
  margin-top: 1.2rem;
  color: #888;
  color: color(display-p3 0.533 0.533 0.533);
  text-align: center;
  font-family: 'Pretendard Variable', Pretendard, sans-serif;
  font-size: 1.5rem;
  font-style: normal;
  font-weight: 400;
  line-height: 145%;
  letter-spacing: -0.045rem;
}

.motion-dialog-button {
  margin-top: 1.8rem;
  display: flex;
  width: 11.5rem;
  height: 11.5rem;
  padding: 3.1rem 2.2rem;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0.8rem;

  border: 0;
  border-radius: 7.6rem;

  background: #0095FF;
  background: color(display-p3 0.0525 0.5736 1);

  cursor: pointer;
  box-sizing: border-box;
  flex-shrink: 0;
  -webkit-appearance: none;
  appearance: none;
  -webkit-tap-highlight-color: transparent;
}
.motion-dialog-button:active { opacity: 0.85; }

.motion-dialog-button-label {
  color: #FFF;
  color: color(display-p3 1 1 1);
  text-align: center;
  font-family: "Roboto Mono", monospace;
  font-size: 1.7rem;
  font-style: normal;
  font-weight: 500;
  line-height: 118%;
  letter-spacing: -0.102rem;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- Safe Area 흰색 배경 레이어 (노치·홈 인디케이터 구역이 검은색으로 노출되지 않도록) -->
<div class="sa-bg sa-bg-top" aria-hidden="true"></div>
<div class="sa-bg sa-bg-bottom" aria-hidden="true"></div>

<!-- Navigation -->
<nav id="main-nav" aria-label="Main navigation">
  <a id="nav-about" class="nav-link" href="#" role="button">About</a>
  <a id="nav-possibilities" class="nav-link" href="#" role="button">Possibilities</a>
</nav>

<!-- Page 1: Gallery -->
<div id="page1" class="page active">
  <div id="viewport">
    <div id="world"></div>
  </div>
</div>

<!-- Page 2: About -->
<div id="page2" class="page">
  <div id="about-scroll">
  <div id="about-wrap">
    <div id="about-text-container">
      <p id="about-text"></p>
      <p id="about-text-blue" aria-hidden="true"></p>
    </div>
    <div id="about-credits">
      <a class="credit-item" href="https://www.instagram.com/__gigawatt/" target="_blank" rel="noopener">
        <span class="credit-role">Industrial Designer</span>
        <span class="credit-name">Seungwhan Ra</span>
      </a>
      <div class="credit-divider" aria-hidden="true"></div>
      <a class="credit-item" href="https://www.behance.net/seunghee" target="_blank" rel="noopener">
        <span class="credit-role">UX Designer</span>
        <span class="credit-name">Seunghee Kim</span>
      </a>
      <div class="credit-divider" aria-hidden="true"></div>
      <a class="credit-item" href="https://www.behance.net/jueun_lee_" target="_blank" rel="noopener">
        <span class="credit-role">Visual Designer</span>
        <span class="credit-name">Jueun Lee</span>
      </a>
      <div class="credit-divider" aria-hidden="true"></div>
      <a class="credit-item" href="https://www.instagram.com/re__0_t/" target="_blank" rel="noopener">
        <span class="credit-role">Space Designer</span>
        <span class="credit-name">Doyun Seo</span>
      </a>
    </div>
    <div id="about-badge-wrap">
      <a id="about-badge" href="https://www.newformative.com/" target="_blank" rel="noopener">2026 MEP Exhibition ⟨everyelse⟩</a>

  </div>
  </div><!-- /about-scroll -->
  <div class="about-blur-bottom" aria-hidden="true"></div>
</div>

<!-- Page 3: Possibilities -->
<div id="page3" class="page"></div>

<!-- Logo: always on top, toggles pages -->
<div id="logo-btn">
  <img src="assets/Logo.svg" alt="Eidos">
</div>

<!-- Gyro toggle (shown on mobile only) -->
<button id="gyro-toggle" aria-label="Toggle gyroscope">ON</button>

<!-- Gyro permission popup (mobile only) -->
<div id="gyro-overlay">
  <div class="motion-dialog-wrapper">
  <div
    class="motion-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="motion-dialog-title"
    aria-describedby="motion-dialog-description"
  >
    <h2 id="motion-dialog-title" class="motion-dialog-title">
      Tilt your device<br>
      to explore
    </h2>
    <p id="motion-dialog-description" class="motion-dialog-description">
      기기를 기울여 다양한 로봇 모듈을<br>
      탐색해 보세요
    </p>
    <button
      id="enable-motion-btn"
      type="button"
      class="motion-dialog-button"
      aria-label="Enable device motion"
    >
      <span class="motion-dialog-button-label">Enable<br>Motion</span>
    </button>
  </div>
  </div>
</div>

<script>
// ─── Device / capability detection ───────────────────────────────────────────
const IS_MOBILE = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                  window.matchMedia('(pointer: coarse)').matches;
const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ─── Module list ──────────────────────────────────────────────────────────────
const MODULES = [
  'H-A-1','H-A-2','H-A-3','H-A-4','H-A-5',
  'H-B-1','H-B-2','H-B-3','H-B-4','H-B-5',
  'H-C-1','H-C-2','H-C-3','H-C-4','H-C-5',
  'H-D-1','H-D-2','H-D-3','H-D-4',
  'H-E-1','H-E-2',
  'C-A-1','C-A-2','C-A-3',
  'C-B-1','C-B-2','C-B-3',
  'C-C-1','C-C-2','C-C-3',
  'C-D-1','C-D-2',
  'C-E-1','C-E-2','C-E-3',
  'S-A-1','S-A-2','S-A-3',
  'S-B-1','S-B-2',
  'S-C-1','S-C-2','S-C-3',
  'S-D-1','S-D-2','S-D-3',
  'S-E-1','S-E-2','S-E-3',
  'U-A-1','U-A-2',
  'U-B-1','U-B-2','U-B-3',
  'U-C-1','U-C-2',
  'U-D-1','U-D-2',
  'U-E-1','U-E-2','U-E-3',
  'F-A-1','F-A-2','F-A-3',
  'F-B-1','F-B-2',
  'F-C-1','F-C-2','F-C-3',
  'F-D-1','F-D-2','F-D-3',
  'F-E-1','F-E-2',
  'E-A-1','E-A-2','E-A-3',
  'E-B-1','E-B-2',
  'E-C-1','E-C-2',
  'E-D-1','E-D-2','E-D-3','E-D-4','E-D-5','E-D-6',
  'L-A-2','L-A-3',
  'L-B-1','L-B-2','L-B-3',
  'L-C-1','L-C-2','L-C-3','L-C-4',
  'L-D-1','L-D-2','L-D-3',
  'L-E-1','L-E-2',
  'L-F-1','L-F-2','L-F-3',
  'L-G-1',
  'EX-A-0','EX-A-1','EX-A-2',
  'EX-B-1','EX-C-1','EX-D-1',
];

// ─── Layout constants (responsive) ───────────────────────────────────────────
const IMG  = IS_MOBILE ? 130 : 200;
const GAP  = IS_MOBILE ? 100 : 160;
const CELL = IMG + GAP;
document.documentElement.style.setProperty('--mod-img', IMG + 'px');

// ─── PRNG ────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  seed = seed >>> 0;
  return function () {
    seed = (seed + 0x6D2B79F5) >>> 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function moduleAt(c, r) {
  const seed = (((c * 73856093) ^ (r * 19349663)) >>> 0) + 1;
  const rng  = mulberry32(seed);
  return MODULES[Math.floor(rng() * MODULES.length)];
}

// ─── DOM elements ────────────────────────────────────────────────────────────
const world          = document.getElementById('world');
const viewport       = document.getElementById('viewport');
const gyroOverlay    = document.getElementById('gyro-overlay');
const gyroToggleBtn  = document.getElementById('gyro-toggle');
const enableMotionBtn = document.getElementById('enable-motion-btn');

// ─── Element pool ─────────────────────────────────────────────────────────────
const modulePool = [];

function acquireModule() {
  return modulePool.pop() || (() => {
    const d = document.createElement('div');
    d.className = 'module';
    d.appendChild(document.createElement('img'));
    return d;
  })();
}

function releaseModule(el) {
  const img = el.querySelector('img');
  if (img && img.dataset.mode === 'gif') {
    img.src = `assets/thumbs/${el.dataset.file}.webp`;
    img.dataset.mode = '';
  }
  el.style.transform = '';
  el.style.zIndex    = '';
  el.dataset.hovered = '';
  if (modulePool.length < 300) modulePool.push(el);
}

// ─── Active modules ───────────────────────────────────────────────────────────
const active = new Map();

function addModule(c, r) {
  const key = c + ',' + r;
  if (active.has(key)) return;
  const file = moduleAt(c, r);
  const el   = acquireModule();
  el.dataset.file = file;
  el.style.left   = (c * CELL) + 'px';
  el.style.top    = (r * CELL) + 'px';
  const img = el.querySelector('img');
  img.src          = `assets/thumbs/${file}.webp`;
  img.alt          = file;
  img.dataset.mode = '';
  applyModBaseScale(el, modBaseScale);
  world.appendChild(el);
  active.set(key, el);
}

function removeModule(key) {
  const el = active.get(key);
  if (!el) return;
  world.removeChild(el);
  releaseModule(el);
  active.delete(key);
}

// ─── Camera ───────────────────────────────────────────────────────────────────
let camX  = -window.innerWidth  / 2;
let camY  = -window.innerHeight / 2;
let scale = IS_MOBILE ? 0.75 : 1.0;
const MIN_SCALE = 0.35, MAX_SCALE = 1.5;

const DRIFT    = 0.55;
const DRIFT_DX = Math.cos(150 * Math.PI / 180) * DRIFT;
const DRIFT_DY = Math.sin(150 * Math.PI / 180) * DRIFT;

function applyCamera() {
  world.style.transform = `scale(${scale}) translate(${-camX}px,${-camY}px)`;
}

// ─── Module base scale ────────────────────────────────────────────────────────
function getModBaseScale(s) {
  if (s >= 1.0) return 1.0;
  return Math.max(0.65, 1.0 - (1.0 - s) * 0.3);
}
let modBaseScale = getModBaseScale(scale);

function applyModBaseScale(el, mbs) {
  el.style.transform = mbs < 1.0 ? `scale(${mbs.toFixed(4)})` : '';
}

function updateModuleBaseScales() {
  const mbs = getModBaseScale(scale);
  if (Math.abs(mbs - modBaseScale) < 0.0005) return;
  modBaseScale = mbs;
  for (const el of active.values()) {
    if (el.dataset.hovered === '1') continue;
    applyModBaseScale(el, mbs);
  }
}

// ─── Viewport culling ─────────────────────────────────────────────────────────
let lastBounds = null;

function updateModules() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const margin = CELL;
  const minC = Math.floor((camX - margin) / CELL);
  const maxC = Math.floor((camX + vw / scale + margin) / CELL);
  const minR = Math.floor((camY - margin) / CELL);
  const maxR = Math.floor((camY + vh / scale + margin) / CELL);

  if (lastBounds &&
      minC === lastBounds.minC && maxC === lastBounds.maxC &&
      minR === lastBounds.minR && maxR === lastBounds.maxR) return;
  lastBounds = { minC, maxC, minR, maxR };

  const rm = CELL * 2;
  const rmMinC = Math.floor((camX - rm) / CELL);
  const rmMaxC = Math.floor((camX + vw / scale + rm) / CELL);
  const rmMinR = Math.floor((camY - rm) / CELL);
  const rmMaxR = Math.floor((camY + vh / scale + rm) / CELL);

  for (const [key, el] of active) {
    const comma = key.indexOf(',');
    const c = +key.slice(0, comma), r = +key.slice(comma + 1);
    if (c < rmMinC || c > rmMaxC || r < rmMinR || r > rmMaxR) removeModule(key);
  }
  for (let r = minR; r <= maxR; r++)
    for (let c = minC; c <= maxC; c++) addModule(c, r);

  for (let r = rmMinR; r <= rmMaxR; r++)
    for (let c = rmMinC; c <= rmMaxC; c++)
      if (!active.has(c + ',' + r)) preloadWebP(moduleAt(c, r));
}

// ─── WebP preload ─────────────────────────────────────────────────────────────
const webpPreloaded = new Set();
function preloadWebP(file) {
  if (webpPreloaded.has(file)) return;
  webpPreloaded.add(file);
  new Image().src = `assets/thumbs/${file}.webp`;
}

// ─── GIF cache ────────────────────────────────────────────────────────────────
const gifCache      = new Map();
const MAX_GIF_CACHE = 16;

function preloadGif(file) {
  if (gifCache.has(file)) return;
  if (gifCache.size >= MAX_GIF_CACHE) gifCache.delete(gifCache.keys().next().value);
  const img = new Image();
  img.src = `assets/${file}.gif`;
  gifCache.set(file, img);
}

function playGif(mod) {
  const file = mod.dataset.file;
  if (!file) return;
  const img = mod.querySelector('img');
  if (!img || img.dataset.mode === 'gif') return;
  img.src = '';
  img.src = `assets/${file}.gif`;
  img.dataset.mode = 'gif';
}

function revertGif(mod) {
  const img = mod.querySelector('img');
  if (!img || img.dataset.mode !== 'gif') return;
  img.src = `assets/thumbs/${mod.dataset.file}.webp`;
  img.dataset.mode = '';
}

// ─── Gyroscope state ──────────────────────────────────────────────────────────
let gyroGranted    = false;  // permission obtained
let gyroEnabled    = false;  // user has not toggled off
let gyroActive     = false;  // not suppressed by touch
let gyroCalib      = true;   // next event = set baseline
let gyroBaseBeta   = 0, gyroBaseGamma = 0;
let targetGyroX    = 0, targetGyroY = 0;
let gyroVX         = 0, gyroVY = 0;
let gyroResumeTimer = null;

function calibrateGyro() {
  gyroCalib     = true;
  gyroBaseBeta  = 0; gyroBaseGamma = 0;
  targetGyroX   = 0; targetGyroY   = 0;
  gyroVX        = 0; gyroVY        = 0;
}

function onDeviceOrientation(e) {
  if (!gyroEnabled) return;
  if (gyroCalib) {
    gyroBaseBeta  = e.beta  ?? 0;
    gyroBaseGamma = e.gamma ?? 0;
    gyroCalib = false;
    return;
  }

  const db = (e.beta  ?? 0) - gyroBaseBeta;
  const dg = (e.gamma ?? 0) - gyroBaseGamma;

  // Axis mapping per screen orientation
  const angle = screen.orientation?.angle ?? 0;
  let tiltX, tiltY;
  if      (angle === 0  ) { tiltX =  dg; tiltY =  db; }
  else if (angle === 90 ) { tiltX = -db; tiltY =  dg; }
  else if (angle === 180) { tiltX = -dg; tiltY = -db; }
  else                    { tiltX =  db; tiltY = -dg; } // 270°

  // Dead zone + normalize to [-1, 1]
  const DZ = 3, MX = 20;
  const norm = v => {
    if (Math.abs(v) < DZ) return 0;
    return Math.max(-1, Math.min(1, (v - Math.sign(v) * DZ) / (MX - DZ)));
  };

  // Only write targets — camera is moved in rAF loop
  targetGyroX = norm(tiltX) * DRIFT * 5;
  targetGyroY = norm(tiltY) * DRIFT * 5;
}

function attachOrientationChange() {
  const handler = () => calibrateGyro();
  if (screen.orientation?.addEventListener) {
    screen.orientation.addEventListener('change', handler);
  } else {
    window.addEventListener('orientationchange', handler);
  }
}

function enableGyro() {
  gyroGranted = true;
  gyroEnabled = true;
  gyroActive  = true;
  calibrateGyro();
  window.addEventListener('deviceorientation', onDeviceOrientation);
  attachOrientationChange();
}

// ─── Theme-color helper ───────────────────────────────────────────────────────
function setThemeColor(color) {
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', color);
}

// ─── Gyro permission popup (mobile only) ──────────────────────────────────────
if (IS_MOBILE) {
  gyroOverlay.classList.add('visible');
  gyroToggleBtn.classList.add('visible');

  enableMotionBtn.addEventListener('click', async () => {
    try {
      if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') {
          enableGyro();
        } else {
          gyroToggleBtn.classList.add('off');
          gyroToggleBtn.textContent = 'OFF';
        }
      } else if ('DeviceOrientationEvent' in window) {
        enableGyro();
      } else {
        gyroToggleBtn.classList.add('off');
        gyroToggleBtn.textContent = 'OFF';
      }
    } catch {
      gyroToggleBtn.classList.add('off');
      gyroToggleBtn.textContent = 'OFF';
    }
    // Fade out popup
    gyroOverlay.style.opacity = '0';
    setTimeout(() => {
      gyroOverlay.classList.remove('visible');
      gyroOverlay.style.opacity = '';
    }, 400);
  });

  // Gyro toggle button
  gyroToggleBtn.addEventListener('click', () => {
    if (!gyroGranted) return; // no permission yet
    gyroEnabled = !gyroEnabled;
    gyroActive  = gyroEnabled;
    if (gyroEnabled) {
      calibrateGyro();
      gyroToggleBtn.textContent = 'ON';
      gyroToggleBtn.classList.remove('off');
    } else {
      targetGyroX = 0; targetGyroY = 0;
      gyroToggleBtn.textContent = 'OFF';
      gyroToggleBtn.classList.add('off');
    }
  });
}

// ─── Drag / inertia state ─────────────────────────────────────────────────────
let isDragging = false;
let velX = 0, velY = 0;

// Desktop
let dragStartX, dragStartY, dragCamX0, dragCamY0, prevMX, prevMY, prevT;

// Touch
let touch1       = null;   // { x, y, camX, camY }
let touchMoved   = false;
let prevTX, prevTY, prevTT;
let pinchState   = null;   // { dist0, scale0, wx, wy, midX, midY }

// Press-and-hold (mobile GIF)
let pressTimer    = null;
let pressedModule = null;

function activateModulePress(el) {
  if (pressedModule) deactivateModulePress();
  pressedModule = el;
  el.dataset.hovered = '1';
  el.style.zIndex = '100';
  el.style.transform = `scale(${(modBaseScale * 1.175).toFixed(4)})`;
  playGif(el);
}

function deactivateModulePress() {
  if (!pressedModule) return;
  pressedModule.dataset.hovered = '';
  pressedModule.style.zIndex = '';
  applyModBaseScale(pressedModule, modBaseScale);
  revertGif(pressedModule);
  pressedModule = null;
}

// ─── Animation loop ───────────────────────────────────────────────────────────
let lastTS = 0;

function loop(ts) {
  const dt = Math.min(ts - lastTS, 50) / 16.667;
  lastTS = ts;

  if (!isDragging) {
    // Gyro smoothing (low-pass filter)
    gyroVX += (targetGyroX - gyroVX) * 0.18;
    gyroVY += (targetGyroY - gyroVY) * 0.18;

    if (!REDUCED_MOTION) {
      if (IS_MOBILE && gyroEnabled && gyroActive && !pressedModule) {
        // Gyro drift — attenuate while inertia is strong
        const inertiaLen = Math.hypot(velX, velY);
        const gyroW = Math.max(0, 1 - inertiaLen / 6);
        camX += gyroVX * dt / scale * gyroW;
        camY += gyroVY * dt / scale * gyroW;
      } else if (!IS_MOBILE || !pressedModule) {
        // Fixed drift (desktop + mobile fallback, paused during press-and-hold)
        camX += DRIFT_DX * dt / scale;
        camY += DRIFT_DY * dt / scale;
      }
    }
  }

  // Inertia
  if (!isDragging) {
    if (Math.abs(velX) > 0.05 || Math.abs(velY) > 0.05) {
      camX += velX * dt;
      camY += velY * dt;
      velX *= Math.pow(0.88, dt);
      velY *= Math.pow(0.88, dt);
    } else {
      velX = 0; velY = 0;
    }
  }

  updateModules();
  updateModuleBaseScales();
  applyCamera();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── Desktop: mouse hover ─────────────────────────────────────────────────────
if (!IS_MOBILE) {
  world.addEventListener('mouseover', e => {
    if (isDragging) return;
    const mod = e.target.closest('.module');
    if (!mod) return;
    mod.dataset.hovered = '1';
    mod.style.transform = `scale(${(modBaseScale * 1.22).toFixed(4)})`;
    mod.style.zIndex    = '100';
    playGif(mod);
  });

  world.addEventListener('mouseout', e => {
    const mod = e.target.closest('.module');
    if (!mod || mod.contains(e.relatedTarget)) return;
    mod.dataset.hovered = '';
    applyModBaseScale(mod, modBaseScale);
    mod.style.zIndex = '';
    revertGif(mod);
  });

  // GIF proximity preload (desktop)
  let gifTimer = null;
  viewport.addEventListener('mousemove', e => {
    clearTimeout(gifTimer);
    gifTimer = setTimeout(() => {
      const wx = e.clientX / scale + camX;
      const wy = e.clientY / scale + camY;
      const r  = CELL * 1.5;
      const c0 = Math.floor((wx - r) / CELL), c1 = Math.floor((wx + r) / CELL);
      const r0 = Math.floor((wy - r) / CELL), r1 = Math.floor((wy + r) / CELL);
      for (let row = r0; row <= r1; row++)
        for (let col = c0; col <= c1; col++) {
          const dx = wx - (col * CELL + IMG / 2), dy = wy - (row * CELL + IMG / 2);
          if (dx * dx + dy * dy < r * r) preloadGif(moduleAt(col, row));
        }
    }, 80);
  });
}

// ─── Desktop: mouse drag ──────────────────────────────────────────────────────
if (!IS_MOBILE) {
  viewport.addEventListener('mousedown', e => {
    isDragging = true;
    viewport.classList.add('dragging');
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragCamX0  = camX;      dragCamY0  = camY;
    velX = 0; velY = 0;
    prevMX = e.clientX; prevMY = e.clientY; prevT = performance.now();
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    camX = dragCamX0 - (e.clientX - dragStartX) / scale;
    camY = dragCamY0 - (e.clientY - dragStartY) / scale;
    const now = performance.now(), dt2 = now - prevT;
    if (dt2 > 0) {
      velX = ((prevMX - e.clientX) / scale) / dt2 * 16;
      velY = ((prevMY - e.clientY) / scale) / dt2 * 16;
    }
    prevMX = e.clientX; prevMY = e.clientY; prevT = now;
  });

  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    viewport.classList.remove('dragging');
    const cap = 25;
    velX = Math.max(-cap, Math.min(cap, velX));
    velY = Math.max(-cap, Math.min(cap, velY));
  });
}

// ─── Mobile: touch handlers ───────────────────────────────────────────────────
if (IS_MOBILE) {
  viewport.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      // Pinch zoom start
      clearTimeout(pressTimer);
      deactivateModulePress();
      isDragging = false;
      touch1 = null;

      const t0 = e.touches[0], t1 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
      const midX = (t0.clientX + t1.clientX) / 2;
      const midY = (t0.clientY + t1.clientY) / 2;
      pinchState = {
        dist0: dist, scale0: scale,
        wx: midX / scale + camX,
        wy: midY / scale + camY,
        midX, midY,
      };
      return;
    }

    if (e.touches.length !== 1) return;
    pinchState = null;

    const t = e.touches[0];
    touch1    = { x: t.clientX, y: t.clientY, camX, camY };
    touchMoved = false;
    isDragging = false;
    velX = 0; velY = 0;
    prevTX = t.clientX; prevTY = t.clientY; prevTT = performance.now();

    // Suppress gyro during touch
    clearTimeout(gyroResumeTimer);
    gyroActive = false;

    // Press-and-hold → GIF
    clearTimeout(pressTimer);
    const tx = t.clientX, ty = t.clientY;
    pressTimer = setTimeout(() => {
      if (!touchMoved) {
        const el = document.elementFromPoint(tx, ty)?.closest?.('.module');
        if (el) activateModulePress(el);
      }
    }, 180);
  }, { passive: true });

  viewport.addEventListener('touchmove', e => {
    e.preventDefault();

    // Pinch
    if (e.touches.length === 2 && pinchState) {
      const t0 = e.touches[0], t1 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE,
        pinchState.scale0 * dist / pinchState.dist0));
      scale = newScale;
      camX  = pinchState.wx - pinchState.midX / scale;
      camY  = pinchState.wy - pinchState.midY / scale;
      lastBounds = null;
      return;
    }

    if (!touch1 || e.touches.length !== 1) return;
    const t = e.touches[0];
    const dx = t.clientX - touch1.x;
    const dy = t.clientY - touch1.y;

    if (!touchMoved && Math.hypot(dx, dy) > 8) {
      touchMoved = true;
      clearTimeout(pressTimer);
      deactivateModulePress();
      isDragging = true;
    }

    if (isDragging) {
      camX = touch1.camX - dx / scale;
      camY = touch1.camY - dy / scale;
      const now = performance.now(), dt2 = now - prevTT;
      if (dt2 > 0) {
        velX = ((prevTX - t.clientX) / scale) / dt2 * 16;
        velY = ((prevTY - t.clientY) / scale) / dt2 * 16;
      }
      prevTX = t.clientX; prevTY = t.clientY; prevTT = now;
    }
  }, { passive: false });

  viewport.addEventListener('touchend', e => {
    if (e.touches.length > 0) return;

    clearTimeout(pressTimer);
    deactivateModulePress();
    isDragging = false;
    touch1     = null;
    pinchState = null;

    const cap = 25;
    velX = Math.max(-cap, Math.min(cap, velX));
    velY = Math.max(-cap, Math.min(cap, velY));

    // Resume gyro after delay
    if (gyroEnabled) {
      clearTimeout(gyroResumeTimer);
      gyroResumeTimer = setTimeout(() => {
        calibrateGyro();
        gyroActive = true;
      }, 400);
    }
  }, { passive: true });
}

// ─── Wheel zoom (desktop) ─────────────────────────────────────────────────────
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const mx = e.clientX, my = e.clientY;
  const wx = mx / scale + camX;
  const wy = my / scale + camY;
  let delta = e.deltaY;
  if (e.deltaMode === 1) delta *= 20;
  if (e.deltaMode === 2) delta *= 300;
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * Math.pow(0.998, delta)));
  if (newScale !== scale) {
    scale = newScale;
    camX  = wx - mx / scale;
    camY  = wy - my / scale;
  }
}, { passive: false });

// ─── Resize: keep camera stable ───────────────────────────────────────────────
window.addEventListener('resize', () => { lastBounds = null; });

// ─── Page toggle ──────────────────────────────────────────────────────────────
const page1   = document.getElementById('page1');
const page2   = document.getElementById('page2');
const page3   = document.getElementById('page3');
const logoBtn = document.getElementById('logo-btn');
const navAbout         = document.getElementById('nav-about');
const navPossibilities = document.getElementById('nav-possibilities');
let   currentPage = 1;

function goToPage(n) {
  [page1, page2, page3].forEach(p => p.classList.remove('active'));
  [navAbout, navPossibilities].forEach(l => l.classList.remove('active'));
  if (n === 1) { page1.classList.add('active'); }
  if (n === 2) { page2.classList.add('active'); navAbout.classList.add('active'); startTyping(); }
  if (n === 3) { page3.classList.add('active'); navPossibilities.classList.add('active'); }
  if (IS_MOBILE) {
    if (n === 1) { gyroToggleBtn.classList.add('visible'); }
    else { gyroToggleBtn.classList.remove('visible'); }
  }
  currentPage = n;
}

const INIT_CAM_X = -window.innerWidth  / 2;
const INIT_CAM_Y = -window.innerHeight / 2;
const INIT_SCALE = IS_MOBILE ? 0.75 : 1.0;

let resetAnim = null;

function resetCamera() {
  if (resetAnim) cancelAnimationFrame(resetAnim);
  const startX = camX, startY = camY, startScale = scale;
  const startTime = performance.now();
  const duration = 600;

  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const e = ease(t);
    camX  = startX  + (INIT_CAM_X - startX)  * e;
    camY  = startY  + (INIT_CAM_Y - startY)  * e;
    scale = startScale + (INIT_SCALE - startScale) * e;
    velX = 0; velY = 0;
    applyCamera();
    cull();
    if (t < 1) resetAnim = requestAnimationFrame(step);
    else resetAnim = null;
  }
  resetAnim = requestAnimationFrame(step);
}

// ── About page word-reveal animation ─────────────────────────────────────────
const ABOUT_FULL = "Eidos is an on-demand robotic service that extends AI responses beyond the screen and into physical action in the real world. Whatever you need, it arrives in the form best suited to the moment, helping turn your intentions into reality. As possibilities once confined to the screen lead to tangible change, AI will become a future living infrastructure that supports every moment of everyday life. Whenever and wherever you need it, call Eidos.";
const aboutTextEl     = document.getElementById('about-text');
const aboutTextBlueEl = document.getElementById('about-text-blue');
let revealTimers = [];

function buildWordSpans(el) {
  const words = ABOUT_FULL.split(' ');
  el.innerHTML = '';
  const inners = [];
  words.forEach((word, i) => {
    const wWrap = document.createElement('span');
    wWrap.className = 'word-wrap';
    const wInner = document.createElement('span');
    wInner.className = 'word-inner';
    wInner.textContent = word;
    wWrap.appendChild(wInner);
    inners.push(wInner);
    el.appendChild(wWrap);
    if (i < words.length - 1) el.appendChild(document.createTextNode(' '));
  });
  return inners;
}

function startTyping() {
  revealTimers.forEach(t => clearTimeout(t));
  revealTimers = [];

  const mainInners = buildWordSpans(aboutTextEl);
  const blueInners = buildWordSpans(aboutTextBlueEl);

  const stagger = 70;
  mainInners.forEach((inner, i) => {
    const t = setTimeout(() => {
      inner.classList.add('revealed');
      blueInners[i].classList.add('revealed');
    }, i * stagger);
    revealTimers.push(t);
  });
}

// ── About spotlight: text mask reveal ────────────────────────────────────────
(function() {
  const textContainer = document.getElementById('about-text-container');
  const blueLayer     = document.getElementById('about-text-blue');

  textContainer.addEventListener('mousemove', (e) => {
    const r = textContainer.getBoundingClientRect();
    blueLayer.style.setProperty('--mx', (e.clientX - r.left) + 'px');
    blueLayer.style.setProperty('--my', (e.clientY - r.top)  + 'px');
  });
  textContainer.addEventListener('mouseleave', () => {
    blueLayer.style.setProperty('--mx', '-9999px');
    blueLayer.style.setProperty('--my', '-9999px');
  });

  // Badge: glow spotlight on dark bg
  const badgeWrap = document.getElementById('about-badge-wrap');
  const badgeSpot = document.getElementById('badge-spotlight');
  if (badgeWrap && badgeSpot) {
    badgeWrap.addEventListener('mouseenter', () => { badgeSpot.style.opacity = '1'; });
    badgeWrap.addEventListener('mouseleave', () => { badgeSpot.style.opacity = '0'; });
    badgeWrap.addEventListener('mousemove', (e) => {
      const r = badgeWrap.getBoundingClientRect();
      badgeSpot.style.left = (e.clientX - r.left) + 'px';
      badgeSpot.style.top  = (e.clientY - r.top)  + 'px';
    });
  }
})();

logoBtn.addEventListener('click', () => {
  if (currentPage === 1) resetCamera();
  else goToPage(1);
});
navAbout.addEventListener('click', e => { e.preventDefault(); goToPage(2); });
navPossibilities.addEventListener('click', e => { e.preventDefault(); goToPage(3); });
</script>
